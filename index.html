<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Robot Assault VR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: Arial, sans-serif; }
    canvas { display: block; }

    #menu, #gameover {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #fff; z-index: 100;
      background: rgba(0,0,0,0.88);
    }
    #gameover { display: none; }

    h1 { font-size: 3.5em; letter-spacing: 4px; margin-bottom: 12px; }
    #menu h1 { color: #00ff88; }
    #gameover h1 { color: #ff4444; }

    .subtitle { color: #888; font-size: 1.1em; margin-bottom: 10px; text-align: center; line-height: 1.8; }
    .controls-hint {
      color: #555; font-size: 0.9em;
      border: 1px solid #333; border-radius: 8px;
      padding: 12px 24px; margin: 20px 0;
      text-align: center; line-height: 2;
    }
    .controls-hint span { color: #00ff88; }

    button {
      padding: 16px 48px; font-size: 1.3em; font-weight: bold;
      background: #00ff88; color: #000;
      border: none; border-radius: 8px; cursor: pointer;
      margin: 8px; letter-spacing: 1px;
      transition: background 0.2s;
    }
    button:hover { background: #00cc66; }

    #finalScore {
      font-size: 1.3em; color: #ffdd00;
      text-align: center; line-height: 2.2;
      margin-bottom: 30px;
      border: 1px solid #444; border-radius: 8px;
      padding: 16px 32px;
    }

    #vrBtn { position: fixed; bottom: 20px; right: 20px; z-index: 200; }
  </style>
</head>
<body>

<!-- Startmenü -->
<div id="menu">
  <h1>ROBOT ASSAULT</h1>
  <p class="subtitle">
    Roboter kommen aus 3 Häusern auf dich zu.<br>
    Überlebe so lange wie möglich!
  </p>
  <div class="controls-hint">
    <span>Trigger</span> — Schießen &nbsp;|&nbsp;
    <span>Y / B</span> — Waffe wechseln<br>
    <span>Kopfbewegung</span> — Zielen &amp; Drehen
  </div>
  <button id="startBtn">SPIEL STARTEN</button>
</div>

<!-- Game Over -->
<div id="gameover">
  <h1>GAME OVER</h1>
  <div id="finalScore"></div>
  <button id="restartBtn">NEU STARTEN</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { VRButton } from 'three/addons/webxr/VRButton.js';

// ─── RENDERER ─────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const vrButton = VRButton.createButton(renderer);
vrButton.id = 'vrBtn';
document.body.appendChild(vrButton);

// ─── SCENE ────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.04);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.05, 100);

const playerRig = new THREE.Group();
playerRig.position.set(0, 0, 0);
scene.add(playerRig);
playerRig.add(camera);

// ─── LICHT ────────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x223344, 2));

const sun = new THREE.DirectionalLight(0x8899ff, 1.5);
sun.position.set(5, 12, 3);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 50;
sun.shadow.camera.left = -20;
sun.shadow.camera.right = 20;
sun.shadow.camera.top = 20;
sun.shadow.camera.bottom = -20;
scene.add(sun);

// Atmosphärische Punktlichter
const atmLights = [
  { pos: [-7, 2, -8],  color: 0x004488 },
  { pos: [7,  2, -8],  color: 0x004488 },
  { pos: [0,  2, -10], color: 0x880022 },
  { pos: [-8, 1,  4],  color: 0x002244 },
  { pos: [8,  1,  4],  color: 0x002244 },
];
atmLights.forEach(({ pos, color }) => {
  const l = new THREE.PointLight(color, 3, 12);
  l.position.set(...pos);
  scene.add(l);
});

// ─── ARENA ────────────────────────────────────────────────────────────────────
function buildArena() {
  // Boden
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(32, 32),
    new THREE.MeshLambertMaterial({ color: 0x0d1a0d })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);

  // Grid-Linien
  const grid = new THREE.GridHelper(32, 32, 0x003300, 0x002200);
  grid.position.y = 0.01;
  scene.add(grid);

  // Arena-Wände
  const wallMat = new THREE.MeshLambertMaterial({ color: 0x1a2233 });
  const wallConfigs = [
    { size: [32, 5, 0.4], pos: [0, 2.5, -16] },
    { size: [32, 5, 0.4], pos: [0, 2.5,  16] },
    { size: [0.4, 5, 32], pos: [-16, 2.5, 0] },
    { size: [0.4, 5, 32], pos: [ 16, 2.5, 0] },
  ];
  wallConfigs.forEach(({ size, pos }) => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(...size), wallMat);
    m.position.set(...pos);
    m.receiveShadow = true;
    m.castShadow = true;
    scene.add(m);
  });

  // Leuchtringe am Boden (Deko)
  const ringGeo = new THREE.RingGeometry(4.8, 5, 64);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0x004400, side: THREE.DoubleSide });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = 0.02;
  scene.add(ring);
}

// ─── HÄUSER ───────────────────────────────────────────────────────────────────
const HOUSE_POSITIONS = [
  new THREE.Vector3(-7, 0, -13),
  new THREE.Vector3( 0, 0, -15),
  new THREE.Vector3( 7, 0, -13),
];

const spawnPoints = [];

function buildHouse(pos, index) {
  const g = new THREE.Group();

  // Hauptkörper
  const bodyMat = new THREE.MeshLambertMaterial({ color: 0x1e2d3d });
  const body = new THREE.Mesh(new THREE.BoxGeometry(3.5, 3.5, 3.5), bodyMat);
  body.position.y = 1.75;
  body.castShadow = true;
  body.receiveShadow = true;
  g.add(body);

  // Dach
  const roofMat = new THREE.MeshLambertMaterial({ color: 0x2a3d55 });
  const roof = new THREE.Mesh(new THREE.ConeGeometry(2.8, 1.8, 4), roofMat);
  roof.position.y = 4.4;
  roof.rotation.y = Math.PI / 4;
  roof.castShadow = true;
  g.add(roof);

  // Tür (schwarz = offen)
  const door = new THREE.Mesh(
    new THREE.BoxGeometry(0.9, 1.8, 0.1),
    new THREE.MeshBasicMaterial({ color: 0x000000 })
  );
  door.position.set(0, 0.9, 1.76);
  g.add(door);

  // Leuchtende Fenster (rot = Gefahr)
  const winMat = new THREE.MeshBasicMaterial({ color: 0xff2200 });
  [-1, 1].forEach(x => {
    const win = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.05), winMat);
    win.position.set(x, 2.2, 1.76);
    g.add(win);
  });

  // Hausnummer-Licht
  const numLight = new THREE.PointLight(0xff2200, 2, 6);
  numLight.position.set(0, 3, 2);
  g.add(numLight);

  g.position.copy(pos);
  scene.add(g);

  // Spawn-Punkt direkt vor der Tür
  const sp = pos.clone();
  sp.z += 2.5;
  spawnPoints.push(sp);
}

// ─── AUDIO ────────────────────────────────────────────────────────────────────
let audioCtx = null;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone({ type = 'sine', freqStart, freqEnd, vol, duration, delay = 0 }) {
  const ctx = getCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.type = type;
  const t = ctx.currentTime + delay;
  osc.frequency.setValueAtTime(freqStart, t);
  if (freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, t + duration);
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
  osc.start(t);
  osc.stop(t + duration + 0.01);
}

function sfxShoot(weapon) {
  if (weapon === 0) { // Pistole
    playTone({ type: 'square', freqStart: 900, freqEnd: 180, vol: 0.25, duration: 0.15 });
  } else if (weapon === 1) { // MG
    playTone({ type: 'square', freqStart: 700, freqEnd: 120, vol: 0.18, duration: 0.09 });
  } else { // Schrotflinte
    playTone({ type: 'sawtooth', freqStart: 350, freqEnd: 40, vol: 0.45, duration: 0.28 });
    playTone({ type: 'sawtooth', freqStart: 280, freqEnd: 30, vol: 0.3, duration: 0.22, delay: 0.02 });
  }
}

function sfxRobotHit() {
  playTone({ type: 'square', freqStart: 180, freqEnd: 80, vol: 0.15, duration: 0.1 });
}

function sfxRobotDie() {
  playTone({ type: 'sawtooth', freqStart: 440, freqEnd: 40, vol: 0.3, duration: 0.5 });
  playTone({ type: 'square',   freqStart: 220, freqEnd: 20, vol: 0.2, duration: 0.4, delay: 0.05 });
}

function sfxPlayerHit() {
  playTone({ type: 'sine', freqStart: 80, freqEnd: 40, vol: 0.5, duration: 0.35 });
}

function sfxLaser() {
  playTone({ type: 'sine',     freqStart: 1400, freqEnd: 800,  vol: 0.25, duration: 3.0 });
  playTone({ type: 'sawtooth', freqStart: 700,  freqEnd: 400,  vol: 0.1,  duration: 3.0 });
}

function sfxWaveStart() {
  [0, 0.12, 0.24].forEach((d, i) => {
    playTone({ type: 'sine', freqStart: 220 + i * 110, freqEnd: 440 + i * 110, vol: 0.2, duration: 0.2, delay: d });
  });
}

let musicTimer = null;
let musicActive = false;

function startMusic() {
  if (musicActive) return;
  musicActive = true;
  const ctx = getCtx();

  // Bass-Pattern
  const bassNotes = [55, 55, 73, 55, 82, 55, 73, 69];
  const hiNotes   = [220, 0, 165, 0, 220, 196, 0, 165];
  const beatSec   = 60 / 130;

  function loop() {
    if (!musicActive) return;
    const now = ctx.currentTime;
    bassNotes.forEach((hz, i) => {
      if (!hz) return;
      playTone({ type: 'square', freqStart: hz, vol: 0.05, duration: beatSec * 0.8, delay: i * beatSec });
    });
    hiNotes.forEach((hz, i) => {
      if (!hz) return;
      playTone({ type: 'sine', freqStart: hz, vol: 0.04, duration: beatSec * 0.5, delay: i * beatSec });
    });
    musicTimer = setTimeout(loop, bassNotes.length * beatSec * 1000 - 100);
  }
  loop();
}

function stopMusic() {
  musicActive = false;
  if (musicTimer) { clearTimeout(musicTimer); musicTimer = null; }
}

// ─── IN-WORLD HUD ─────────────────────────────────────────────────────────────
const hudCanvas = document.createElement('canvas');
hudCanvas.width = 512;
hudCanvas.height = 200;
const hc = hudCanvas.getContext('2d');
const hudTex = new THREE.CanvasTexture(hudCanvas);

const hudMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(0.55, 0.215),
  new THREE.MeshBasicMaterial({ map: hudTex, transparent: true, depthTest: false, depthWrite: false })
);
hudMesh.position.set(0, -0.28, -0.75);
hudMesh.renderOrder = 999;
camera.add(hudMesh);

const WEAPON_NAMES = ['PISTOLE', 'MASCHINENGEWEHR', 'SCHROTFLINTE', 'LASER'];
const WEAPON_COLORS = ['#ffee00', '#00eeff', '#ff8800', '#ff0066'];

function drawHUD(gs) {
  const W = 512, H = 200;
  hc.clearRect(0, 0, W, H);

  hc.fillStyle = 'rgba(0,0,0,0.55)';
  hc.beginPath();
  hc.roundRect(0, 0, W, H, 14);
  hc.fill();

  // HP-Leiste
  hc.fillStyle = '#1a1a1a';
  hc.fillRect(16, 14, 300, 26);
  const hpPct = gs.hp / 100;
  hc.fillStyle = hpPct > 0.5 ? '#00ff88' : hpPct > 0.25 ? '#ffaa00' : '#ff3333';
  hc.fillRect(16, 14, 300 * hpPct, 26);
  hc.strokeStyle = '#333';
  hc.lineWidth = 1;
  hc.strokeRect(16, 14, 300, 26);
  hc.fillStyle = '#fff';
  hc.font = 'bold 17px Arial';
  hc.fillText(`HP  ${gs.hp}`, 22, 33);

  // Waffe
  hc.fillStyle = WEAPON_COLORS[gs.weapon];
  hc.font = 'bold 20px Arial';
  hc.fillText(`[ ${WEAPON_NAMES[gs.weapon]} ]`, 16, 62);

  // Laser-Ladeanzeige
  if (gs.weapon === 3) {
    hc.fillStyle = '#1a1a1a';
    hc.fillRect(16, 70, 300, 18);
    hc.fillStyle = gs.laserCharge >= 1 ? '#ff0066' : '#661133';
    hc.fillRect(16, 70, 300 * gs.laserCharge, 18);
    hc.strokeStyle = '#444';
    hc.lineWidth = 1;
    hc.strokeRect(16, 70, 300, 18);
    hc.fillStyle = '#fff';
    hc.font = '13px Arial';
    const laserLabel = gs.laserActive
      ? `AKTIV — ${gs.laserTime.toFixed(1)}s`
      : gs.laserCharge >= 1 ? 'BEREIT — Trigger drücken' : `LÄDT... ${Math.floor(gs.laserCharge * 100)}%`;
    hc.fillText(laserLabel, 20, 84);
  }

  // Welle | Score | Abschüsse
  hc.fillStyle = '#aaaadd';
  hc.font = '17px Arial';
  hc.fillText(`Welle: ${gs.wave}`, 16, 108);
  hc.fillStyle = '#ffffff';
  hc.fillText(`Score: ${gs.score}`, 16, 134);
  hc.fillStyle = '#ff9955';
  hc.fillText(`Abschüsse: ${gs.kills}`, 16, 160);

  // Roboter übrig
  hc.fillStyle = '#55ccff';
  hc.fillText(`Roboter: ${gs.alive}`, 280, 108);

  hudTex.needsUpdate = true;
}

// ─── FADENKREUZ ───────────────────────────────────────────────────────────────
const crosshair = new THREE.Group();
const chMat = new THREE.MeshBasicMaterial({ color: 0x00ff88, depthTest: false });
const hBar = new THREE.Mesh(new THREE.PlaneGeometry(0.014, 0.002), chMat);
const vBar = new THREE.Mesh(new THREE.PlaneGeometry(0.002, 0.014), chMat);
const dot  = new THREE.Mesh(new THREE.CircleGeometry(0.002, 8), chMat);
crosshair.add(hBar, vBar, dot);
crosshair.position.set(0, 0, -1);
crosshair.renderOrder = 998;
camera.add(crosshair);

// ─── LASER-STRAHL ─────────────────────────────────────────────────────────────
const laserBeam = new THREE.Mesh(
  new THREE.CylinderGeometry(0.012, 0.012, 35, 8),
  new THREE.MeshBasicMaterial({ color: 0xff0055, transparent: true, opacity: 0.9, depthTest: false })
);
laserBeam.rotation.x = Math.PI / 2;
laserBeam.position.z = -17.5;
laserBeam.visible = false;
laserBeam.renderOrder = 997;
camera.add(laserBeam);

const laserGlow = new THREE.Mesh(
  new THREE.CylinderGeometry(0.04, 0.04, 35, 8),
  new THREE.MeshBasicMaterial({ color: 0xff0055, transparent: true, opacity: 0.2, depthTest: false })
);
laserGlow.rotation.x = Math.PI / 2;
laserGlow.position.z = -17.5;
laserGlow.visible = false;
laserGlow.renderOrder = 996;
camera.add(laserGlow);

// ─── CONTROLLER ───────────────────────────────────────────────────────────────
const ctrl0 = renderer.xr.getController(0);
const ctrl1 = renderer.xr.getController(1);
playerRig.add(ctrl0, ctrl1);

[ctrl0, ctrl1].forEach(c => {
  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.018, 0.024, 0.12, 8),
    new THREE.MeshLambertMaterial({ color: 0x333344 })
  );
  body.rotation.x = Math.PI / 2;
  c.add(body);

  // Zielstrahl
  const pts = [new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-20)];
  const ray = new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.35 })
  );
  c.add(ray);
});

// ─── WAFFEN-KONFIGURATION ─────────────────────────────────────────────────────
const WEAPONS = [
  { damage: 30, cooldown: 0.45, spread: 0,    pellets: 1 }, // Pistole
  { damage: 12, cooldown: 0.11, spread: 0.04, pellets: 1 }, // MG
  { damage: 18, cooldown: 0.95, spread: 0.14, pellets: 6 }, // Schrotflinte
];
const BULLET_COLORS = [0xffee00, 0x00eeff, 0xff8800];

// ─── SPIELZUSTAND ─────────────────────────────────────────────────────────────
const gs = {
  running: false,
  hp: 100, score: 0, wave: 1, kills: 0, alive: 0,
  weapon: 0, cooldown: 0,
  triggerWasDown: false,
  weaponBtnWasDown: false,
  timeSurvived: 0,
  waveEnding: false,
  laserActive: false,
  laserTime: 0,
  laserCharge: 1,
  laserRecharging: false,
};

// ─── GEGNER ───────────────────────────────────────────────────────────────────
const robots = [];
const ROBOT_HP     = 60;
const ROBOT_SPEED  = 1.1;
const ROBOT_RANGE  = 1.6;
const ROBOT_DMG    = 12;
const ROBOT_ATKSPD = 1.8;

const robotBodyMat = new THREE.MeshLambertMaterial({ color: 0x778899 });
const robotEyeMat  = new THREE.MeshBasicMaterial({ color: 0xff0000 });

function makeRobot(pos) {
  const g = new THREE.Group();

  const body = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.75, 0.38), robotBodyMat.clone());
  body.position.y = 1.0; body.castShadow = true; g.add(body);

  const head = new THREE.Mesh(new THREE.BoxGeometry(0.38, 0.38, 0.36), robotBodyMat.clone());
  head.position.y = 1.6; head.castShadow = true; g.add(head);

  const eyeGeo = new THREE.SphereGeometry(0.07, 6, 6);
  [-0.1, 0.1].forEach(x => {
    const e = new THREE.Mesh(eyeGeo, robotEyeMat);
    e.position.set(x, 1.63, 0.19); g.add(e);
  });

  const armGeo = new THREE.BoxGeometry(0.14, 0.55, 0.14);
  [-0.39, 0.39].forEach(x => {
    const a = new THREE.Mesh(armGeo, robotBodyMat.clone());
    a.position.set(x, 1.0, 0); g.add(a);
  });

  const legGeo = new THREE.BoxGeometry(0.18, 0.45, 0.18);
  [-0.13, 0.13].forEach(x => {
    const l = new THREE.Mesh(legGeo, robotBodyMat.clone());
    l.position.set(x, 0.225, 0); g.add(l);
  });

  g.position.copy(pos);
  g.position.y = 0;
  scene.add(g);

  const r = { mesh: g, hp: ROBOT_HP, atkTimer: Math.random() * ROBOT_ATKSPD, walkT: Math.random() * Math.PI * 2, dead: false };
  robots.push(r);
  gs.alive++;
  return r;
}

function spawnWave() {
  gs.waveEnding = false;
  const count = gs.wave;
  for (let h = 0; h < 3; h++) {
    for (let i = 0; i < count; i++) {
      const p = spawnPoints[h].clone();
      p.x += (Math.random() - 0.5) * 2;
      p.z += Math.random() * 2;
      makeRobot(p);
    }
  }
  sfxWaveStart();
}

// ─── GESCHOSSE ────────────────────────────────────────────────────────────────
const bullets = [];

function shoot() {
  if (gs.weapon === 3) return;
  const w = WEAPONS[gs.weapon];
  for (let i = 0; i < w.pellets; i++) {
    const dir = new THREE.Vector3(0, 0, -1);
    dir.applyQuaternion(camera.getWorldQuaternion(new THREE.Quaternion()));
    dir.x += (Math.random() - 0.5) * w.spread;
    dir.y += (Math.random() - 0.5) * w.spread;
    dir.normalize();

    const mesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.055, 5, 5),
      new THREE.MeshBasicMaterial({ color: BULLET_COLORS[gs.weapon] })
    );
    const origin = new THREE.Vector3();
    camera.getWorldPosition(origin);
    mesh.position.copy(origin);
    scene.add(mesh);

    bullets.push({ mesh, dir, speed: 28, dmg: w.damage, life: 2.2 });
  }
  sfxShoot(gs.weapon);
  gs.cooldown = w.cooldown;
}

// ─── INPUT ────────────────────────────────────────────────────────────────────
function handleInput(dt) {
  const session = renderer.xr.getSession();
  if (!session) return;

  let triggerDown = false;
  let weaponBtnDown = false;

  for (const src of session.inputSources) {
    const gp = src.gamepad;
    if (!gp) continue;

    if (gp.buttons[0]?.pressed) triggerDown = true;
    // Y (left hand btn 3), B (right hand btn 3), X (btn 2)
    if (gp.buttons[3]?.pressed || gp.buttons[4]?.pressed) weaponBtnDown = true;
  }

  // Schießen — Pistole/Schrotflinte: einmal pro Druck; MG: gehalten
  if (triggerDown && gs.cooldown <= 0 && gs.running && gs.weapon !== 3) {
    if (gs.weapon === 1 || !gs.triggerWasDown) {
      shoot();
    }
  }

  // Laser aktivieren
  if (gs.weapon === 3 && triggerDown && !gs.triggerWasDown && gs.running) {
    if (gs.laserCharge >= 1 && !gs.laserActive) {
      gs.laserActive = true;
      gs.laserTime = 3.0;
      gs.laserCharge = 0;
      gs.laserRecharging = false;
      sfxLaser();
    }
  }
  gs.triggerWasDown = triggerDown;

  // Waffe wechseln (nicht während Laser aktiv)
  if (weaponBtnDown && !gs.weaponBtnWasDown && !gs.laserActive) {
    gs.weapon = (gs.weapon + 1) % 4;
    gs.cooldown = 0;
  }
  gs.weaponBtnWasDown = weaponBtnDown;
}

// ─── SPIELLOGIK ───────────────────────────────────────────────────────────────
const PLAYER_POS = new THREE.Vector3(0, 0, 0);
const tmpVec = new THREE.Vector3();

function update(dt) {
  if (!gs.running) return;

  gs.timeSurvived += dt;
  gs.cooldown = Math.max(0, gs.cooldown - dt);

  handleInput(dt);

  // Score
  gs.score = gs.kills * 10 + (gs.wave - 1) * 50 + Math.floor(gs.timeSurvived);

  // ─── LASER ──────────────────────────────────────────────────────────────────
  if (gs.laserActive) {
    gs.laserTime -= dt;
    const pulse = 0.75 + Math.sin(Date.now() * 0.025) * 0.25;
    laserBeam.visible = true;
    laserGlow.visible = true;
    laserBeam.material.opacity = pulse;
    laserGlow.material.opacity = pulse * 0.22;

    // Laserstrahl-Richtung aus Kamera
    const laserOrigin = new THREE.Vector3();
    const laserDir = new THREE.Vector3(0, 0, -1);
    camera.getWorldPosition(laserOrigin);
    laserDir.applyQuaternion(camera.getWorldQuaternion(new THREE.Quaternion()));

    for (let r = robots.length - 1; r >= 0; r--) {
      const rob = robots[r];
      if (rob.dead) continue;
      // Körpermitte des Roboters
      const cx = rob.mesh.position.x - laserOrigin.x;
      const cy = (rob.mesh.position.y + 1.0) - laserOrigin.y;
      const cz = rob.mesh.position.z - laserOrigin.z;
      const proj = cx * laserDir.x + cy * laserDir.y + cz * laserDir.z;
      if (proj < 0) continue;
      const dx = cx - proj * laserDir.x;
      const dy = cy - proj * laserDir.y;
      const dz = cz - proj * laserDir.z;
      if (dx*dx + dy*dy + dz*dz < 0.5 * 0.5) {
        sfxRobotDie();
        killRobot(r);
      }
    }

    if (gs.laserTime <= 0) {
      gs.laserActive = false;
      gs.laserRecharging = true;
      laserBeam.visible = false;
      laserGlow.visible = false;
    }
  } else {
    laserBeam.visible = false;
    laserGlow.visible = false;
    if (gs.laserRecharging) {
      gs.laserCharge = Math.min(1, gs.laserCharge + dt / 8);
      if (gs.laserCharge >= 1) gs.laserRecharging = false;
    }
  }

  // Geschosse
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.life -= dt;
    if (b.life <= 0) { scene.remove(b.mesh); bullets.splice(i, 1); continue; }
    b.mesh.position.addScaledVector(b.dir, b.speed * dt);

    // Treffer-Test
    for (let r = robots.length - 1; r >= 0; r--) {
      const rob = robots[r];
      if (rob.dead) continue;

      const rx = rob.mesh.position.x;
      const ry = rob.mesh.position.y;
      const rz = rob.mesh.position.z;
      const bx = b.mesh.position.x;
      const by = b.mesh.position.y;
      const bz = b.mesh.position.z;

      // Kopf-Hitbox: Mittelpunkt bei y+1.6, Radius 0.22
      const headDx = bx - rx, headDy = by - (ry + 1.6), headDz = bz - rz;
      const headHit = (headDx*headDx + headDy*headDy + headDz*headDz) < 0.22 * 0.22;

      // Körper-Hitbox: Mittelpunkt bei y+1.0, Radius 0.42
      const bodyDx = bx - rx, bodyDy = by - (ry + 1.0), bodyDz = bz - rz;
      const bodyHit = (bodyDx*bodyDx + bodyDy*bodyDy + bodyDz*bodyDz) < 0.42 * 0.42;

      if (headHit) {
        sfxHeadshot();
        flashGold(rob);
        killRobot(r);
        scene.remove(b.mesh);
        bullets.splice(i, 1);
        break;
      } else if (bodyHit) {
        rob.hp -= b.dmg;
        sfxRobotHit();
        flashRed(rob);
        if (rob.hp <= 0) killRobot(r);
        scene.remove(b.mesh);
        bullets.splice(i, 1);
        break;
      }
    }
  }

  // Roboter bewegen & angreifen
  for (const rob of robots) {
    if (rob.dead) continue;
    tmpVec.copy(PLAYER_POS).sub(rob.mesh.position);
    const dist = tmpVec.length();

    rob.mesh.lookAt(PLAYER_POS);

    if (dist > ROBOT_RANGE) {
      tmpVec.normalize();
      rob.mesh.position.addScaledVector(tmpVec, ROBOT_SPEED * dt);
      rob.walkT += dt * 6;
      rob.mesh.position.y = Math.abs(Math.sin(rob.walkT)) * 0.06;
    } else {
      rob.atkTimer -= dt;
      if (rob.atkTimer <= 0) {
        rob.atkTimer = ROBOT_ATKSPD;
        gs.hp = Math.max(0, gs.hp - ROBOT_DMG);
        sfxPlayerHit();
        if (gs.hp <= 0) { endGame(); return; }
      }
    }
  }

  // Wellen-Ende
  if (gs.alive === 0 && !gs.waveEnding) {
    gs.waveEnding = true;
    gs.score += 50;
    gs.wave++;
    setTimeout(() => { if (gs.running) spawnWave(); }, 3500);
  }

  drawHUD(gs);
}

function flashRed(rob) {
  rob.mesh.traverse(c => { if (c.isMesh && c.material.color) c.material.color.set(0xff2200); });
  setTimeout(() => {
    if (!rob.dead) rob.mesh.traverse(c => { if (c.isMesh && c.material.color) c.material.color.set(0x778899); });
  }, 120);
}

function flashGold(rob) {
  rob.mesh.traverse(c => { if (c.isMesh && c.material.color) c.material.color.set(0xffdd00); });
}

function sfxHeadshot() {
  // Höherer, schärferer Klang als normaler Treffer
  playTone({ type: 'square', freqStart: 1200, freqEnd: 600, vol: 0.3, duration: 0.12 });
  playTone({ type: 'sine',   freqStart: 800,  freqEnd: 400, vol: 0.2, duration: 0.18, delay: 0.06 });
}

function killRobot(idx) {
  const rob = robots[idx];
  rob.dead = true;
  scene.remove(rob.mesh);
  robots.splice(idx, 1);
  gs.alive--;
  gs.kills++;
  sfxRobotDie();
}

// ─── SPIELSTART / NEUSTART ────────────────────────────────────────────────────
function startGame() {
  // Aufräumen
  [...robots].forEach(r => scene.remove(r.mesh));
  robots.length = 0;
  [...bullets].forEach(b => scene.remove(b.mesh));
  bullets.length = 0;

  Object.assign(gs, {
    running: true, hp: 100, score: 0, wave: 1, kills: 0, alive: 0,
    weapon: 0, cooldown: 0,
    triggerWasDown: false, weaponBtnWasDown: false,
    timeSurvived: 0, waveEnding: false,
    laserActive: false, laserTime: 0, laserCharge: 1, laserRecharging: false,
  });
  laserBeam.visible = false;
  laserGlow.visible = false;

  document.getElementById('menu').style.display    = 'none';
  document.getElementById('gameover').style.display = 'none';

  startMusic();
  spawnWave();
  drawHUD(gs);
}

function endGame() {
  gs.running = false;
  stopMusic();

  document.getElementById('gameover').style.display = 'flex';
  document.getElementById('finalScore').innerHTML =
    `Score: <b>${gs.score}</b><br>
     Abschüsse: ${gs.kills}<br>
     Wellen überstanden: ${gs.wave - 1}<br>
     Überlebenszeit: ${Math.floor(gs.timeSurvived)} Sek.`;
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);

// ─── WELT AUFBAUEN ────────────────────────────────────────────────────────────
buildArena();
HOUSE_POSITIONS.forEach((pos, i) => buildHouse(pos, i));

// ─── RENDER-SCHLEIFE ──────────────────────────────────────────────────────────
const clock = new THREE.Clock();

renderer.setAnimationLoop(() => {
  const dt = Math.min(clock.getDelta(), 0.05); // max 50ms step
  update(dt);
  renderer.render(scene, camera);
});

// ─── RESIZE ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
